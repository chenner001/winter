<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网易云音乐 - Spring Autumn Sunset</title>
    <style>
        /* ================= 基础重置 ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "Segoe UI", sans-serif;
            height: 100vh; overflow: hidden; background-color: #1a1a1a; color: #fff;
        }

        /* ================= 全屏背景与毛玻璃遮罩 ================= */
        .player-container {
            position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column;
            /* 使用要求的相对路径背景图 */
            background-image: url('网易云.png');
            background-size: cover; background-position: center;
        }
        /* 渐变暗化遮罩，确保右侧文字清晰可见 (类似参考图质感) */
        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(20, 10, 10, 0.4) 0%, rgba(30, 15, 15, 0.85) 60%, rgba(20, 10, 10, 0.95) 100%);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1;
        }

        /* ================= 顶部导航栏 ================= */
        .top-bar {
            position: relative; z-index: 10; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px;
        }
        .top-left .icon-down { font-size: 24px; color: rgba(255,255,255,0.7); cursor: pointer; }
        .top-right { display: flex; align-items: center; gap: 20px; font-size: 14px; color: rgba(255,255,255,0.6); }
        .top-right .window-controls { display: flex; gap: 15px; font-size: 16px; margin-left: 20px; }
        .window-controls span { cursor: pointer; transition: color 0.2s; }
        .window-controls span:hover { color: #fff; }

        /* ================= 主体内容区 (左右分栏) ================= */
        .main-content {
            position: relative; z-index: 10; flex: 1; display: flex; padding: 20px 80px 0 80px; overflow: hidden;
        }
        
        /* 左侧留白 (配合背景图的视觉中心) */
        .left-art { flex: 1; display: flex; justify-content: center; align-items: center; }

        /* 右侧歌词区 */
        .right-lyrics {
            flex: 1.2; display: flex; flex-direction: column; padding-left: 40px; padding-top: 40px; position: relative;
        }
        .song-title { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .song-title h1 { font-size: 32px; font-weight: 500; letter-spacing: 1px; }
        .vip-tag { border: 1px solid rgba(255,255,255,0.4); padding: 1px 4px; border-radius: 4px; font-size: 10px; font-weight: bold; color: rgba(255,255,255,0.8); }
        
        .song-info { display: flex; gap: 20px; font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 25px; }
        .song-info span { cursor: pointer; }
        .song-info span:hover { color: rgba(255,255,255,0.8); }

        .lyrics-tabs { display: flex; gap: 20px; margin-bottom: 50px; font-size: 14px; }
        .lyrics-tabs .tab { color: rgba(255,255,255,0.5); cursor: pointer; padding: 4px 12px; border-radius: 15px; }
        .lyrics-tabs .tab.active { background: rgba(255,255,255,0.1); color: #fff; }

        /* 歌词文本 */
        .lyrics-container { display: flex; flex-direction: column; gap: 30px; }
        .lyric-line { font-size: 18px; color: rgba(255,255,255,0.4); transition: all 0.3s ease; }
        .lyric-line.active { font-size: 28px; color: #fff; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* 右侧悬浮功能按钮 */
        .floating-actions {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px;
        }
        .float-btn {
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.6);
            cursor: pointer; font-size: 14px; transition: 0.2s;
        }
        .float-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* ================= 底部播放控制栏 ================= */
        .bottom-bar {
            position: relative; z-index: 10; height: 80px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2);
        }

        /* 底部左侧：歌曲信息与评论入口 */
        .bottom-left { display: flex; align-items: center; gap: 20px; width: 300px; }
        .bottom-song-info { display: flex; flex-direction: column; gap: 4px; }
        .bottom-song-title { font-size: 15px; color: #fff; display: flex; align-items: center; gap: 6px; }
        .bottom-song-artist { font-size: 12px; color: rgba(255,255,255,0.5); }
        .action-icons { display: flex; align-items: center; gap: 15px; margin-left: 20px; }
        .action-icons span, .action-icons a { font-size: 20px; color: rgba(255,255,255,0.6); cursor: pointer; text-decoration: none; transition: 0.2s; position: relative;}
        .action-icons span:hover, .action-icons a:hover { color: #fff; }
        
        /* 评论数角标 */
        .comment-badge {
            position: absolute; top: -6px; right: -14px; font-size: 9px; 
            transform: scale(0.8); background: transparent; color: rgba(255,255,255,0.6);
        }
        .like-icon { color: #ff5a5a !important; }

        /* 底部中间：播放控制 */
        .bottom-center { display: flex; align-items: center; gap: 30px; }
        .ctrl-btn { font-size: 18px; color: rgba(255,255,255,0.7); cursor: pointer; transition: 0.2s; }
        .ctrl-btn:hover { color: #fff; }
        .play-btn {
            width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center; font-size: 20px; color: #fff; cursor: pointer;
        }
        .play-btn:hover { background: rgba(255,255,255,0.2); }

        /* 底部右侧：音质与功能 */
        .bottom-right { display: flex; align-items: center; gap: 20px; width: 300px; justify-content: flex-end; color: rgba(255,255,255,0.6); font-size: 16px; }
        .quality-tag { border: 1px solid rgba(255,255,255,0.4); padding: 1px 4px; border-radius: 3px; font-size: 10px; }
        .bottom-right span { cursor: pointer; transition: 0.2s; }
        .bottom-right span:hover { color: #fff; }
    </style>
</head>
<body>

    <!-- 隐藏的音频播放器 (相对路径) -->
    <audio id="audioPlayer" src="Spring-Autumn-Sunset-chosic.com_.mp3"></audio>

    <div class="player-container">
        <!-- 渐变毛玻璃遮罩 -->
        <div class="bg-overlay"></div>

        <!-- 顶部导航 -->
        <header class="top-bar">
            <div class="top-left">
                <span class="icon-down">∨</span>
            </div>
            <div class="top-right">
                <span>⏱ 播放器模式</span>
                <div class="window-controls">
                    <span>[ ]</span>
                    <span>—</span>
                    <span>□</span>
                    <span>✕</span>
                </div>
            </div>
        </header>

        <!-- 主体区域 -->
        <main class="main-content">
            <div class="left-art">
                <!-- 左侧留空，透出底层网易云.png的背景画面 -->
            </div>
            <div class="right-lyrics">
                <!-- 歌曲标题 -->
                <div class="song-title">
                    <h1>Spring Autumn Sunset</h1>
                    <span class="vip-tag">VIP</span>
                </div>
                <!-- 歌曲信息 -->
                <div class="song-info">
                    <span>专辑: Spring Autumn</span>
                    <span>歌手: Artificial.Music</span>
                    <span>来源: 极夜的电台</span>
                </div>
                <!-- 选项卡 -->
                <div class="lyrics-tabs">
                    <span class="tab active">歌词</span>
                    <span class="tab">百科</span>
                    <span class="tab">相似推荐</span>
                </div>
                <!-- 歌词正文 -->
                <div class="lyrics-container">
                    <div class="lyric-line">纯音乐</div>
                    <!-- 经典的高亮显示 -->
                    <div class="lyric-line active">Wish I could be with you forever.</div>
                </div>

                <!-- 悬浮操作按钮 -->
                <div class="floating-actions">
                    <div class="float-btn" title="翻译">译</div>
                    <div class="float-btn" title="字体大小">Tt</div>
                    <div class="float-btn" title="更多">···</div>
                </div>
            </div>
        </main>

        <!-- 底部控制栏 -->
        <footer class="bottom-bar">
            <!-- 左侧：评论等交互 -->
            <div class="bottom-left">
                <div class="bottom-song-info">
                    <div class="bottom-song-title">Spring Autumn Sunse... <span class="vip-tag" style="border-color: #ff5a5a; color: #ff5a5a;">VIP</span></div>
                    <div class="bottom-song-artist">Artificial.Music</div>
                </div>
                <div class="action-icons">
                    <span class="like-icon">❤</span>
                    <!-- 核心解谜入口：点击打开 comments.html -->
                    <a href="comments.html" target="_blank" title="打开评论区">
                        💬 <span class="comment-badge">999+</span>
                    </a>
                </div>
            </div>

            <!-- 中间：播放控制 -->
            <div class="bottom-center">
                <span class="ctrl-btn">🔁</span>
                <span class="ctrl-btn">⏮</span>
                <!-- 播放/暂停按钮 -->
                <div class="play-btn" id="playBtn">▶</div>
                <span class="ctrl-btn">⏭</span>
                <span class="ctrl-btn">☰</span>
            </div>

            <!-- 右侧：音质与拓展 -->
            <div class="bottom-right">
                <span class="quality-tag">极高</span>
                <span>🎧</span>
                <span>词</span>
                <span>🔊</span>
                <span>···</span>
            </div>
        </footer>
    </div>

    <!-- 播放逻辑脚本 -->
    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        let isPlaying = false;

        // 点击播放/暂停切换
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '▶'; // 切换为播放图标
            } else {
                audio.play();
                playBtn.innerHTML = '⏸'; // 切换为暂停图标
            }
            isPlaying = !isPlaying;
        });

        // 监听音频播放结束，自动重置按钮
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.innerHTML = '▶';
        });
    </script>
</body>
</html>
