<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026江城当代艺术双年展 —— 浮空之境</title>
    <style>
        /* 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #e0e0e0;
            overflow: hidden; 
            height: 100vh;
            display: flex;
        }

        /* 艺术感抽象流线渐变背景 */
        .abstract-bg {
            position: fixed;
            top: -20%; left: -20%; width: 140%; height: 140%;
            background: 
                radial-gradient(circle at 20% 40%, rgba(45, 25, 60, 0.6) 0%, transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(20, 45, 65, 0.6) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(65, 30, 30, 0.5) 0%, transparent 50%);
            background-color: #07070a;
            z-index: -1;
            filter: blur(40px);
            animation: flow 18s ease-in-out infinite alternate;
        }
        @keyframes flow {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(2deg) scale(1.05) translate(2%, 2%); }
            100% { transform: rotate(-2deg) scale(1) translate(-2%, -2%); }
        }

        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 20px 40px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .header h1 { font-size: 14px; font-weight: 300; color: #888; letter-spacing: 3px; }
        .live-badge { color: #ff4757; font-size: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 6px;}
        .live-badge::before { content: ''; display: block; width: 6px; height: 6px; background: #ff4757; border-radius: 50%; animation: pulse 1.5s infinite; }

        /* 左侧：全息画作展区 (主区域) */
        .gallery-area {
            flex: 1;
            padding: 80px 40px 40px 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            align-content: center;
            gap: 30px;
            perspective: 1000px;
            overflow-y: auto; 
        }
        .gallery-area::-webkit-scrollbar { display: none; }

        /* 投影画作 */
        .artwork-item {
            position: relative;
            width: 28%;
            min-width: 200px;
            opacity: 0.6;
            cursor: pointer;
            border-radius: 2px;
            /* 投影与浮动特效 */
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 20px rgba(255,255,255,0.05);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: floating 5s ease-in-out infinite;
        }
        /* 独立的浮动动画延迟，显得错落有致 */
        .artwork-item:nth-child(1) { animation-delay: 0s; width: 32%; }
        .artwork-item:nth-child(2) { animation-delay: -1.5s; width: 25%; margin-top: 40px; }
        .artwork-item:nth-child(3) { animation-delay: -3s; width: 28%; margin-top: -30px; }
        .artwork-item:nth-child(4) { animation-delay: -0.5s; width: 22%; }
        .artwork-item:nth-child(5) { animation-delay: -2s; width: 26%; margin-top: 20px;}
        .artwork-item:nth-child(6) { animation-delay: -4s; width: 30%; margin-top: -10px;}

        /* 画布纹理滤镜 */
        .artwork-item::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 4px);
            pointer-events: none;
        }

        .artwork-item img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
            mix-blend-mode: screen; 
        }

        .artwork-item:hover, .artwork-item.active {
            opacity: 1;
            transform: scale(1.08) translateZ(30px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255, 180, 100, 0.2);
            z-index: 10;
        }
        .artwork-item.active img { mix-blend-mode: normal; border-color: rgba(255, 160, 50, 0.5); }

        /* 右侧：详情与取色控制台 */
        .side-panel {
            width: 380px;
            background: rgba(12, 12, 16, 0.75);
            backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255,255,255,0.05);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            z-index: 50;
        }

        .default-state { display: flex; flex: 1; align-items: center; justify-content: center; color: #555; letter-spacing: 2px; font-size: 14px; text-align: center; }
        
        .details-state { display: none; flex-direction: column; height: 100%; }
        
        .art-title { font-size: 24px; font-weight: 300; margin-bottom: 5px; color: #fff; letter-spacing: 2px; }
        .art-artist { font-size: 12px; color: #888; margin-bottom: 30px; letter-spacing: 1px; font-family: monospace; }
        .art-desc { font-size: 13px; line-height: 1.8; color: #aaa; margin-bottom: auto; text-align: justify; }

        /* 取色交互区 */
        .interaction-area { margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px; }
        
        .tool-btn {
            width: 100%; padding: 12px;
            background: transparent; border: 1px solid #ff9e00; color: #ff9e00;
            cursor: pointer; font-size: 13px; letter-spacing: 1px; transition: all 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .tool-btn:hover { background: rgba(255, 158, 0, 0.1); }
        .tool-btn.picking { background: #ff9e00; color: #000; box-shadow: 0 0 15px rgba(255, 158, 0, 0.4); }

        /* 侧边直接显示的结果 */
        .result-box {
            display: none;
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 4px;
            animation: fadeIn 0.5s ease forwards;
        }
        .result-box .label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        .result-box .hex-value { font-size: 32px; font-weight: bold; color: #fff; letter-spacing: 3px; font-family: monospace; display: flex; align-items: center; gap: 15px; }
        .color-swatch { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #fff; box-shadow: 0 0 10px currentColor; }
        .result-box .sys-note { margin-top: 15px; font-size: 12px; color: #ff9e00; line-height: 1.5; }

        /* 全局取色准星 */
        body.picker-mode, body.picker-mode .artwork-item { cursor: crosshair !important; }

        /* 隐秘的作者引导 (仅框选可见) */
        .secret-clue {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.1); /* 肉眼几乎不可见 */
            z-index: 9999;
            pointer-events: auto; 
            user-select: text;
        }
        .secret-clue::selection {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* 动画 */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes floating { 0% { transform: translateY(0px); } 50% { transform: translateY(-12px); } 100% { transform: translateY(0px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 抽象背景 -->
    <div class="abstract-bg"></div>

    <!-- 顶部 -->
    <div class="header">
        <h1>2026 浮空之境 // 沉浸式艺术特展</h1>
        <div class="live-badge">画廊状态在线</div>
    </div>

    <!-- 左侧画廊区 -->
    <div class="gallery-area" id="galleryArea">
        <!-- 动态生成画作 -->
    </div>

    <!-- 右侧面板 -->
    <div class="side-panel">
        <!-- 默认状态 -->
        <div class="default-state" id="defaultState">
            等待鉴赏...<br><br>请在左侧点击悬浮画作以展开详情
        </div>

        <!-- 详情状态 -->
        <div class="details-state" id="detailsState">
            <div class="art-title" id="pTitle">《画作名称》</div>
            <div class="art-artist" id="pArtist">Artist: 屿秋</div>
            <div class="art-desc" id="pDesc">描述文本...</div>

            <div class="interaction-area">
                <button class="tool-btn" id="eyedropperBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path><path d="M15 5l4 4"></path></svg>
                    激活色彩提取笔
                </button>

                <!-- 侧边直接显示的结果 -->
                <div class="result-box" id="resultBox">
                    <div class="label">提取色彩代码 // Hex Code</div>
                    <div class="hex-value">
                        <div class="color-swatch" id="colorSwatch"></div>
                        <span id="hexText">#000000</span>
                    </div>
                    <div class="sys-note" id="sysNote"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐秘彩蛋：用鼠标框选右下角可见 -->
    <div class="secret-clue">寻找色彩的源头：小红书 秋屿冬</div>

    <script>
        // 纯艺术向的画作数据描述
        const artworksData = [
            { id: 'art1', src: '落日.jpg', title: '《落日沉溺》', artist: '屿秋 (Yuqiu)', desc: '暖橘色的余晖洒满天际，画笔捕捉了黄昏退散前最温柔的一抹余温，让人沉醉于这片刻的宁静。', hex: '#ff9933', isKey: false },
            { id: 'art2', src: '极夜回声.png', title: '《流星轨迹》', artist: '屿秋 (Yuqiu)', desc: '寂静的夜空深邃如镜，星辰的光芒在黑暗中交织出微弱而恒久的旋律。', hex: '#E1D5E7', isKey: false },
            { id: 'art3', src: '8230F43ED1ADB6C65298830E2E76D4D1.jpg', title: '《黄金水域》', artist: '屿秋 (Yuqiu)', desc: '阳光肆意倾泻在波光粼粼的水面上，刺眼而温暖。创作者用层层叠叠的金色调，勾勒出生命深处对光芒本能的追寻与渴望。', hex: '#FFC125', isKey: false },
            { id: 'art4', src: 'B9911CEBB5D9EFBC252F0579EDE4BC47.jpg', title: '《无界之蓝》', artist: '屿秋 (Yuqiu)', desc: '幽深而克制的情感宣泄。每一道翻涌海浪的高光、每一抹深邃的蔚蓝，都经过了无数次的重构与覆盖，在静谧中蕴藏着无尽的力量。', hex: '#4682B4', isKey: false },
            { id: 'art3', src: '25906BE2F1E2B88FCC1724B55E6F5F14.jpg', title: '《星月呢喃》', artist: '屿秋 (Yuqiu)', desc: '少女端坐于新月之上，指尖轻拂过洒落的星尘，仿佛在聆听夜幕深处的童话。', hex: '#2B1B54', isKey: false },
            { id: 'art4', src: '81D901F295707625D26A44949B1D7CE8.jpg', title: '《深海沉眠》', artist: '屿秋 (Yuqiu)', desc: '执剑的少女向着深渊坠落，幽蓝的海水包裹着无声的挣扎，光影在水波中破碎又重组。', hex: '#112233', isKey: false }
        ];

        const galleryArea = document.getElementById('galleryArea');
        const defaultState = document.getElementById('defaultState');
        const detailsState = document.getElementById('detailsState');
        
        // 面板元素
        const pTitle = document.getElementById('pTitle');
        const pArtist = document.getElementById('pArtist');
        const pDesc = document.getElementById('pDesc');
        const eyedropperBtn = document.getElementById('eyedropperBtn');
        const resultBox = document.getElementById('resultBox');
        const hexText = document.getElementById('hexText');
        const colorSwatch = document.getElementById('colorSwatch');
        const sysNote = document.getElementById('sysNote');

        let currentActiveArt = null;
        let isPickerMode = false;

        // 1. 渲染画廊
        artworksData.forEach(art => {
            const div = document.createElement('div');
            div.className = 'artwork-item';
            div.innerHTML = `<img src="${art.src}" alt="${art.title}">`;
            
            // 实时悬浮取色逻辑
            div.addEventListener('mouseenter', () => {
                if (isPickerMode) {
                    showColorResult(art);
                }
            });

            // 点击逻辑
            div.addEventListener('click', (e) => {
                // 若处于取色模式，点击则锁定该颜色并退出取色模式
                if (isPickerMode) {
                    showColorResult(art);
                    cancelPicker();
                    return;
                }

                // 正常查看详情逻辑
                document.querySelectorAll('.artwork-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                currentActiveArt = art;
                
                // 更新侧边栏
                defaultState.style.display = 'none';
                detailsState.style.display = 'flex';
                pTitle.innerText = art.title;
                pArtist.innerText = `Artist: ${art.artist}`;
                pDesc.innerText = art.desc;
                
                // 切换画作时隐藏之前取色的结果面板
                resultBox.style.display = 'none';
                cancelPicker();
            });

            galleryArea.appendChild(div);
        });

        // 2. 取色器开关逻辑
        eyedropperBtn.addEventListener('click', () => {
            if (!currentActiveArt) return;
            
            isPickerMode = !isPickerMode;
            if (isPickerMode) {
                document.body.classList.add('picker-mode');
                eyedropperBtn.classList.add('picking');
                eyedropperBtn.innerHTML = "实时取色中 // 悬停于任意画作提取";
                resultBox.style.display = 'none'; // 收起旧结果，等待新悬停
            } else {
                cancelPicker();
            }
        });

        // 3. 执行取色并在侧边栏直接显示
        function showColorResult(art) {
            resultBox.style.display = 'block';
            hexText.innerText = art.hex;
            colorSwatch.style.backgroundColor = art.hex;
            colorSwatch.style.color = art.hex; 

            if (art.isKey) {
                sysNote.innerHTML = "※ 提取成功。已捕获该画作的核心色值。<br>";
                sysNote.style.color = "#ff9e00";
            } else {
                sysNote.innerHTML = "※ 提取成功。已捕获该画作的核心色值。";
                sysNote.style.color = "#888";
            }
        }

        // 4. 重置工具状态
        function cancelPicker() {
            isPickerMode = false;
            document.body.classList.remove('picker-mode');
            eyedropperBtn.classList.remove('picking');
            eyedropperBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path><path d="M15 5l4 4"></path></svg> 激活色彩提取笔`;
        }
    </script>
</body>
</html>
